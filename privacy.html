<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CieloCell — privacy policy</title>
<link rel="icon" type="image/png" sizes="256x256" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #FFF6E5; font-family: 'DM Sans', sans-serif; color: #0E1F18; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="cc-tokens.jsx"></script>
<script type="text/babel" src="cc-icons.jsx"></script>
<script type="text/babel" src="cc-components.jsx"></script>
<script type="text/babel" src="cc-legal-shared.jsx"></script>
<script type="text/babel" src="cc-terms-page.jsx"></script>
<script type="text/babel" src="cc-privacy-page.jsx"></script>
<script type="text/babel">
  const here = 'privacy';
  const onBack = () => { window.location.href = 'index.html'; };
  const navigate = (next) => {
    if (next === here) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
    if (next === 'terms')   { window.location.href = 'terms.html'; return; }
    if (next === 'privacy') { window.location.href = 'privacy.html'; return; }
    window.location.href = 'index.html';
  };
  ReactDOM.createRoot(document.getElementById('root')).render(
    <PrivacyPage onBack={onBack} onNav={navigate} />
  );
</script>
</body>
</html>
